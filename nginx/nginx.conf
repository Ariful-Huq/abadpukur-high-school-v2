# abadpukur-high-school/nginx/nginx.conf
upstream backend {
    server backend:8000;
}

upstream frontend {
    server frontend:80;
}

server {
    listen 80;
    server_name 34.177.86.52;

    client_max_body_size 20M;

    # Static files for Django Admin (admin CSS/JS)
    location /static/ {
        alias /app/static/; 
    }

    # Media files (Student/Teacher photos)
    location /media/ {
        alias /app/media/;
    }

    # Backend API and Admin
    location ~ ^/(api|admin) {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Everything else → React SPA
    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}